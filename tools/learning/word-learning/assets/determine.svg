  </defs>
  <rect fill="url(#grad_determine)" width="300" height="200" rx="16"/>
  <rect x="20" y="20" width="260" height="160" fill="white" fill-opacity="0.1" rx="12"/>
  <text x="150" y="85" font-size="56" text-anchor="middle" fill="white" filter="url(#shadow)">🎲</text>
  <text x="150" y="130" font-size="24" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">determine</text>
  <text x="150" y="160" font-size="14" fill="white" fill-opacity="0.9" text-anchor="middle" font-family="Arial, sans-serif">决定，确定</text>
