<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic English — 用 850 词表达一切</title>
    <style>/* ============================================
   Basic English — The Quiet Study
   Warm Paper & Ink 设计系统
   ============================================ */

/* Google Fonts fallback — Cormorant Garamond for display */
/* Google Fonts disabled in offline bundle — falls back to Georgia */

/* CSS Variables */
:root {
    /* Colors — only 4 hues */
    --ink: #1C1C1E;
    --ink-light: #636366;
    --ink-faint: #AEAEB2;
    --paper: #FAF9F6;
    --paper-dark: #F0EDE8;
    --accent: #C75B39;
    --accent-soft: rgba(199, 91, 57, 0.08);
    --accent-soft-hover: rgba(199, 91, 57, 0.14);
    --success: #4A8C6F;
    --success-soft: rgba(74, 140, 111, 0.12);
    --warning: #D4A853;
    --warning-soft: rgba(212, 168, 83, 0.12);
    --error: #C75B39;
    --error-soft: rgba(199, 91, 57, 0.08);
    --divider: rgba(0, 0, 0, 0.06);

    /* Shadows */
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
    --shadow-card: 0 2px 16px rgba(0, 0, 0, 0.06);
    --shadow-hover: 0 4px 24px rgba(0, 0, 0, 0.10);

    /* Typography */
    --font-display: 'Cormorant Garamond', 'Georgia', 'Noto Serif SC', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;

    /* Font Sizes */
    --text-hero: 56px;
    --text-display: 36px;
    --text-title: 24px;
    --text-body: 17px;
    --text-small: 14px;
    --text-caption: 12px;

    /* Spacing */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 12px;
    --space-lg: 16px;
    --space-xl: 24px;
    --space-2xl: 32px;
    --space-3xl: 48px;
    --space-4xl: 64px;
    --space-5xl: 80px;

    /* Border Radius */
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --radius-full: 9999px;

    /* Transitions */
    --ease-out: 350ms cubic-bezier(0, 0, 0.2, 1);
    --ease-spring: 400ms cubic-bezier(0.175, 0.885, 0.32, 1.275);
    --ease-spring-strong: 600ms cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* Reset */
*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: var(--font-body);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.6;
}

#app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* ============================================
   Screens
   ============================================ */
.screen {
    display: none;
    flex: 1;
    padding: var(--space-md) var(--space-lg);
    max-width: 560px;
    width: 100%;
    margin: 0 auto;
}

.screen.active {
    display: flex;
    flex-direction: column;
    animation: screenEnter 350ms ease-out;
}

@keyframes screenEnter {
    from {
        opacity: 0;
        transform: translateY(8px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ============================================
   Progress Indicator (5-step)
   ============================================ */
.step-indicator {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: var(--space-sm) 0;
    margin-bottom: var(--space-xs);
}

.step-dot-group {
    display: flex;
    align-items: center;
}

.step-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--paper-dark);
    transition: all var(--ease-spring);
    position: relative;
    cursor: pointer;
}

.step-dot.completed {
    background: var(--ink);
}

.step-dot.current {
    background: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
}

.step-dot.locked {
    background: var(--paper-dark);
    border: 2px solid var(--divider);
}

.step-line {
    width: 24px;
    height: 2px;
    background: var(--divider);
    margin: 0 3px;
    transition: background var(--ease-out);
}

.step-line.completed {
    background: var(--ink);
}

.step-labels {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-top: 2px;
    margin-bottom: var(--space-md);
}

.step-label {
    font-size: 10px;
    color: var(--ink-faint);
    text-align: center;
    width: 52px;
    transition: color var(--ease-out);
}

.step-label.completed {
    color: var(--ink-light);
}

.step-label.current {
    color: var(--accent);
    font-weight: 600;
}

/* ============================================
   Word Card (核心组件)
   ============================================ */
.word-card {
    background: var(--paper);
    border-radius: var(--radius-xl);
    padding: var(--space-3xl) var(--space-xl);
    text-align: center;
    box-shadow: var(--shadow-card);
    margin-bottom: var(--space-md);
    animation: cardAppear 400ms cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes cardAppear {
    from {
        opacity: 0;
        transform: scale(0.96);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

.word-card .phonetic {
    font-size: var(--text-small);
    color: var(--ink-faint);
    margin-bottom: var(--space-md);
    font-family: var(--font-mono);
}

.word-card .word-display {
    font-family: var(--font-display);
    font-size: var(--text-hero);
    font-weight: 700;
    color: var(--ink);
    line-height: 1.1;
    margin-bottom: var(--space-lg);
    letter-spacing: -0.5px;
}

.word-card .chinese-meaning {
    font-size: var(--text-body);
    color: var(--ink-light);
    font-weight: 400;
    margin-bottom: var(--space-xl);
}

.word-card .audio-btn {
    display: inline-flex;
    align-items: center;
    gap: var(--space-sm);
    background: none;
    border: 1px solid var(--divider);
    color: var(--ink-light);
    padding: var(--space-sm) var(--space-xl);
    border-radius: var(--radius-full);
    font-size: var(--text-small);
    cursor: pointer;
    transition: all var(--ease-out);
    font-family: var(--font-body);
}

.word-card .audio-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
}

.word-card .audio-btn:active {
    transform: scale(0.97);
}

/* ============================================
   Option Buttons
   ============================================ */
.options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--space-md);
    margin-top: var(--space-lg);
}

.option-btn {
    background: var(--paper-dark);
    border: 2px solid transparent;
    border-radius: var(--radius-md);
    padding: var(--space-lg);
    font-size: var(--text-body);
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    transition: all 250ms ease;
    text-align: center;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-sm);
    font-family: var(--font-body);
    position: relative;
}

.option-btn:hover {
    background: var(--paper);
    border-color: var(--divider);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
}

.option-btn:active {
    transform: translateY(0);
}

.option-btn.correct {
    background: var(--success-soft);
    border-color: var(--success);
    color: var(--success);
}

.option-btn.wrong {
    background: var(--error-soft);
    border-color: var(--error);
    color: var(--error);
    animation: wrongShake 400ms cubic-bezier(0.36, 0.07, 0.19, 0.97);
}

.option-btn.dimmed {
    opacity: 0.4;
}

@keyframes wrongShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-4px); }
    40% { transform: translateX(4px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(3px); }
}

.option-btn .feedback-icon {
    font-size: var(--text-body);
    opacity: 0;
    transition: opacity 250ms ease;
}

.option-btn.correct .feedback-icon,
.option-btn.wrong .feedback-icon {
    opacity: 1;
}

/* ============================================
   Paraphrasing Input (Step 4 核心)
   ============================================ */
.paraphrase-area {
    margin-top: var(--space-xl);
}

.paraphrase-prompt {
    font-size: var(--text-small);
    color: var(--ink-light);
    margin-bottom: var(--space-lg);
    line-height: 1.5;
}

.paraphrase-original {
    font-family: var(--font-display);
    font-size: var(--text-title);
    color: var(--ink);
    font-style: italic;
    padding: var(--space-xl);
    background: var(--paper-dark);
    border-radius: var(--radius-md);
    margin-bottom: var(--space-xl);
    line-height: 1.4;
    quotes: '\201C' '\201D';
}

.paraphrase-original::before { content: '\201C'; }
.paraphrase-original::after { content: '\201D'; }

.paraphrase-input-wrapper {
    position: relative;
    margin-bottom: var(--space-lg);
}

.paraphrase-input {
    width: 100%;
    padding: var(--space-lg);
    padding-bottom: var(--space-sm);
    font-family: var(--font-mono);
    font-size: var(--text-body);
    line-height: 1.6;
    border: none;
    border-bottom: 2px solid var(--divider);
    background: transparent;
    color: var(--ink);
    resize: vertical;
    min-height: 80px;
    transition: border-color var(--ease-out);
    outline: none;
}

.paraphrase-input:focus {
    border-color: var(--accent);
}

.paraphrase-input::placeholder {
    color: var(--ink-faint);
}

/* Real-time feedback below input */
.checker-feedback {
    margin-top: var(--space-lg);
    padding: var(--space-lg);
    border-radius: var(--radius-md);
    font-size: var(--text-small);
    line-height: 1.6;
}

.checker-feedback.valid {
    background: var(--success-soft);
    color: var(--success);
}

.checker-feedback.invalid {
    background: var(--error-soft);
    color: var(--error);
}

.checker-feedback .feedback-title {
    font-weight: 600;
    margin-bottom: var(--space-sm);
    font-size: var(--text-body);
}

.checker-feedback .invalid-word {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    padding: var(--space-xs) 0;
}

.checker-feedback .invalid-word .original {
    text-decoration: underline;
    text-decoration-color: var(--error);
    text-underline-offset: 3px;
    text-decoration-style: wavy;
    font-family: var(--font-mono);
}

.checker-feedback .invalid-word .suggestion {
    color: var(--success);
}

.checker-feedback .invalid-word .arrow {
    color: var(--ink-faint);
}

/* Submit button for paraphrasing */
.paraphrase-submit {
    background: var(--paper-dark);
    color: var(--ink-light);
    border: none;
    padding: var(--space-md) var(--space-2xl);
    border-radius: var(--radius-full);
    font-size: var(--text-body);
    font-weight: 600;
    cursor: pointer;
    transition: all var(--ease-out);
    font-family: var(--font-body);
    margin-top: var(--space-lg);
}

.paraphrase-submit.has-input {
    background: var(--accent);
    color: white;
}

.paraphrase-submit.has-input:hover {
    opacity: 0.9;
    box-shadow: var(--shadow-card);
}

/* ============================================
   Reading Screen
   ============================================ */
.reading-passage {
    font-family: var(--font-display);
    font-size: 20px;
    line-height: 1.8;
    color: var(--ink);
    padding: var(--space-2xl);
    background: var(--paper);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    margin-bottom: var(--space-2xl);
    letter-spacing: 0.01em;
}

.reading-passage .passage-title {
    font-size: var(--text-title);
    font-weight: 700;
    margin-bottom: var(--space-xl);
    color: var(--ink);
    text-align: center;
}

.reading-passage .passage-source {
    font-size: var(--text-caption);
    color: var(--ink-faint);
    text-align: center;
    margin-top: var(--space-xl);
    font-family: var(--font-body);
    font-style: italic;
}

.reading-questions {
    display: flex;
    flex-direction: column;
    gap: var(--space-xl);
}

.reading-question-card {
    background: var(--paper-dark);
    border-radius: var(--radius-lg);
    padding: var(--space-xl);
}

.reading-question-card .question-text {
    font-size: var(--text-body);
    color: var(--ink);
    font-weight: 600;
    margin-bottom: var(--space-md);
    line-height: 1.5;
}

.reading-question-card .options-grid {
    margin-top: 0;
}

.reading-question-card .option-btn {
    background: var(--paper);
}

/* Vocabulary notes */
.vocab-notes {
    margin-top: var(--space-xl);
    padding: var(--space-xl);
    background: var(--paper-dark);
    border-radius: var(--radius-lg);
}

.vocab-notes h4 {
    font-size: var(--text-small);
    color: var(--ink-light);
    margin-bottom: var(--space-md);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.vocab-note-item {
    display: flex;
    gap: var(--space-md);
    padding: var(--space-sm) 0;
    font-size: var(--text-small);
    border-bottom: 1px solid var(--divider);
}

.vocab-note-item:last-child {
    border-bottom: none;
}

.vocab-note-item .vn-word {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: var(--text-body);
    color: var(--ink);
    min-width: 100px;
}

.vocab-note-item .vn-meaning {
    color: var(--ink-light);
}

/* ============================================
   Replacement Showcase — 复杂词 → Basic 组合（核心视觉组件）
   ============================================ */
.replacement-showcase {
    background: var(--paper);
    border-radius: var(--radius-lg);
    padding: var(--space-lg);
    margin: var(--space-md) 0;
    text-align: center;
    box-shadow: var(--shadow-card);
    border: 1px solid var(--divider);
}

.replacement-showcase .rs-label {
    font-size: var(--text-caption);
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: var(--space-md);
}

.replacement-showcase .rs-complex {
    font-family: var(--font-display);
    font-size: var(--text-title);
    color: var(--ink-faint);
    text-decoration: line-through;
    text-decoration-color: var(--error);
    text-underline-offset: 6px;
    margin-bottom: 2px;
    line-height: 1.3;
}

.replacement-showcase .rs-arrow {
    font-size: 24px;
    color: var(--accent);
    margin: 0;
    font-weight: 700;
    animation: arrowPulse 2s ease-in-out infinite;
}

@keyframes arrowPulse {
    0%, 100% { opacity: 0.6; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(2px); }
}

.replacement-showcase .rs-verb {
    font-family: var(--font-display);
    font-size: 40px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.1;
}

.replacement-showcase .rs-particle {
    display: inline-block;
    background: var(--accent-soft);
    color: var(--accent);
    padding: 2px var(--space-md);
    border-radius: var(--radius-full);
    font-family: var(--font-display);
    font-size: var(--text-title);
    font-weight: 700;
    margin-left: var(--space-sm);
}

.replacement-showcase .rs-replaces {
    font-size: var(--text-small);
    color: var(--ink-light);
    margin-top: var(--space-sm);
}

.replacement-showcase .rs-replaces strong {
    color: var(--accent);
    font-weight: 600;
}

.replacement-showcase .rs-example {
    font-family: var(--font-display);
    font-style: italic;
    font-size: var(--text-body);
    color: var(--ink);
    margin-top: var(--space-md);
    padding-top: var(--space-md);
    border-top: 1px solid var(--divider);
    line-height: 1.6;
}

/* Combination option buttons (enhanced) */
.combination-option {
    background: var(--paper-dark);
    border: 2px solid transparent;
    border-radius: var(--radius-md);
    padding: var(--space-lg);
    cursor: pointer;
    transition: all 250ms ease;
    text-align: center;
    min-height: 48px;
    font-family: var(--font-body);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
}

.combination-option:hover {
    border-color: var(--accent);
    background: var(--paper);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
}

.combination-option .co-verb {
    font-family: var(--font-display);
    font-size: var(--text-title);
    font-weight: 700;
    color: var(--ink);
}

.combination-option .co-particle {
    font-family: var(--font-display);
    font-size: var(--text-title);
    font-weight: 700;
    color: var(--accent);
}

.combination-option .co-replaces {
    font-size: var(--text-caption);
    color: var(--ink-faint);
    margin-top: 2px;
}

.combination-option.correct {
    background: var(--success-soft);
    border-color: var(--success);
}

.combination-option.correct .co-verb,
.combination-option.correct .co-particle {
    color: var(--success);
}

.combination-option.wrong {
    background: var(--error-soft);
    border-color: var(--error);
    animation: wrongShake 400ms cubic-bezier(0.36, 0.07, 0.19, 0.97);
}

.combination-option.wrong .co-verb,
.combination-option.wrong .co-particle {
    color: var(--error);
}

.combination-option.dimmed {
    opacity: 0.35;
}

/* Combinations list in word card */
.word-combinations {
    margin-top: var(--space-lg);
    padding-top: var(--space-lg);
    border-top: 1px solid var(--divider);
    text-align: left;
}

.word-combinations .wc-label {
    font-size: var(--text-caption);
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: var(--space-sm);
}

.word-combinations .wc-item {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: var(--text-small);
    color: var(--accent);
    background: var(--accent-soft);
    padding: 2px var(--space-sm);
    border-radius: var(--radius-sm);
    margin: 2px 4px 2px 0;
}

.word-combinations .wc-item .wc-arrow {
    color: var(--ink-faint);
    margin: 0 2px;
}

/* ============================================
   Stats / Results (文字为主的统计)
   ============================================ */
.stats-hero {
    text-align: center;
    padding: var(--space-xl) 0;
}

.stats-number {
    font-family: var(--font-display);
    font-size: 56px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -1px;
}

.stats-label {
    font-size: var(--text-small);
    color: var(--ink-light);
    margin-top: var(--space-sm);
}

.stats-grid-compact {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--space-md);
    margin-top: var(--space-2xl);
}

.stat-item-compact {
    text-align: center;
    padding: var(--space-xl) var(--space-sm);
}

.stat-item-compact .stat-value-compact {
    font-family: var(--font-display);
    font-size: var(--text-display);
    font-weight: 700;
    color: var(--ink);
    line-height: 1.1;
}

.stat-item-compact .stat-label-compact {
    font-size: var(--text-caption);
    color: var(--ink-faint);
    margin-top: var(--space-xs);
}

/* Calm feedback text */
.feedback-calm {
    text-align: center;
    font-size: var(--text-body);
    color: var(--ink-light);
    padding: var(--space-xl);
    font-style: italic;
    line-height: 1.6;
}

/* ============================================
   Buttons
   ============================================ */
.btn-primary {
    background: var(--accent);
    color: white;
    border: none;
    padding: var(--space-md) var(--space-2xl);
    border-radius: var(--radius-full);
    font-size: var(--text-body);
    font-weight: 600;
    cursor: pointer;
    transition: all var(--ease-out);
    font-family: var(--font-body);
    box-shadow: var(--shadow-sm);
}

.btn-primary:hover {
    opacity: 0.92;
    box-shadow: var(--shadow-card);
    transform: translateY(-1px);
}

.btn-primary:active {
    transform: translateY(0);
}

.btn-secondary {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--divider);
    padding: var(--space-md) var(--space-2xl);
    border-radius: var(--radius-full);
    font-size: var(--text-body);
    font-weight: 500;
    cursor: pointer;
    transition: all var(--ease-out);
    font-family: var(--font-body);
}

.btn-secondary:hover {
    border-color: var(--ink-light);
    background: var(--paper-dark);
}

.btn-back {
    background: none;
    border: none;
    font-size: var(--text-body);
    color: var(--ink-light);
    cursor: pointer;
    padding: var(--space-sm) var(--space-md);
    border-radius: var(--radius-sm);
    transition: color var(--ease-out);
    font-family: var(--font-body);
    align-self: flex-start;
    margin-bottom: var(--space-lg);
}

.btn-back:hover {
    color: var(--ink);
}

/* ============================================
   Section Headers
   ============================================ */
.section-title {
    font-family: var(--font-display);
    font-size: var(--text-display);
    font-weight: 700;
    color: var(--ink);
    margin-bottom: var(--space-sm);
    letter-spacing: -0.5px;
    line-height: 1.15;
}

.section-subtitle {
    font-size: var(--text-body);
    color: var(--ink-light);
    margin-bottom: var(--space-2xl);
    line-height: 1.6;
}

/* ============================================
   Step Lock Overlay
   ============================================ */
.step-locked {
    opacity: 0.5;
    pointer-events: none;
    filter: grayscale(0.5);
    position: relative;
}

.lock-message {
    text-align: center;
    padding: var(--space-xl);
    color: var(--ink-faint);
    font-size: var(--text-small);
    margin-top: var(--space-lg);
}

/* ============================================
   Navigation
   ============================================ */
.bottom-nav {
    display: flex;
    justify-content: center;
    gap: var(--space-xs);
    padding: var(--space-lg);
    padding-bottom: max(var(--space-lg), env(safe-area-inset-bottom));
    background: var(--paper);
    border-top: 1px solid var(--divider);
    position: sticky;
    bottom: 0;
}

.nav-step {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-full);
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--text-caption);
    color: var(--ink-faint);
    transition: all var(--ease-out);
    font-family: var(--font-body);
    font-weight: 600;
    position: relative;
}

.nav-step:hover {
    background: var(--paper-dark);
    color: var(--ink);
}

.nav-step.active {
    background: var(--accent-soft);
    color: var(--accent);
}

.nav-step.completed {
    color: var(--ink);
}

.nav-step.locked {
    color: var(--ink-faint);
    cursor: not-allowed;
    opacity: 0.5;
}

/* ============================================
   Empty / Greeting State
   ============================================ */
.greeting {
    text-align: center;
    padding: var(--space-xl) var(--space-lg);
}

.greeting .greeting-text {
    font-family: var(--font-display);
    font-size: var(--text-display);
    color: var(--ink);
    margin-bottom: var(--space-sm);
}

.greeting .greeting-detail {
    font-size: var(--text-body);
    color: var(--ink-light);
}

/* ============================================
   Achievement / Progress feedback
   ============================================ */
.achievement-toast {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--paper);
    padding: var(--space-md) var(--space-xl);
    border-radius: var(--radius-full);
    font-size: var(--text-small);
    font-weight: 500;
    z-index: 200;
    animation: toastIn 400ms ease-out, toastOut 400ms 2s ease-out forwards;
    white-space: nowrap;
}

@keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(16px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

@keyframes toastOut {
    from { opacity: 1; }
    to { opacity: 0; }
}

/* ============================================
   Correct line indicator (under word card)
   ============================================ */
.word-card.correct-answer {
    box-shadow: var(--shadow-card), 0 2px 0 0 var(--success);
    transition: box-shadow 300ms ease;
}

.word-card.wrong-answer {
    animation: cardShake 400ms cubic-bezier(0.36, 0.07, 0.19, 0.97);
}

@keyframes cardShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-3px); }
    40% { transform: translateX(3px); }
    60% { transform: translateX(-3px); }
    80% { transform: translateX(2px); }
}

/* ============================================
   Difficulty indicator
   ============================================ */
.difficulty-badge {
    display: inline-block;
    padding: 2px var(--space-sm);
    border-radius: var(--radius-sm);
    font-size: var(--text-caption);
    font-weight: 500;
    margin-left: var(--space-sm);
}

.difficulty-badge.easy {
    background: var(--success-soft);
    color: var(--success);
}

.difficulty-badge.medium {
    background: var(--warning-soft);
    color: var(--warning);
}

.difficulty-badge.hard {
    background: var(--error-soft);
    color: var(--error);
}

/* ============================================
   Progress text
   ============================================ */
.progress-text {
    font-size: var(--text-small);
    color: var(--ink-faint);
    text-align: center;
    margin-bottom: var(--space-lg);
    font-family: var(--font-mono);
}

/* ============================================
   Responsive
   ============================================ */

@media (max-width: 399px) {

        --text-hero: 36px;

    .step-line {

    .greeting .greeting-text {

    .section-title {

    .reading-passage {

/* 手机/小平板 (400-768px) */

    <script>/**
 * localStorage 封装模块 — Basic English
 * 适配自 word-learning/js/storage.js，换用 be_* 前缀，增加转述历史字段
 */

const Storage = {
    KEYS: {
        USER_DATA: 'be_user_data',
        WORD_PROGRESS: 'be_word_progress',
        SETTINGS: 'be_settings',
        WORD_CACHE: 'be_word_cache',
        PARAPHRASING_HISTORY: 'be_paraphrasing_history',
        READING_HISTORY: 'be_reading_history'
    },

    getDefaultUserData() {
        return {
            currentStep: 1,
            operationsCompleted: 0,
            vocabularyCompleted: 0,
            totalXp: 0,
            streak: 0,
            lastLearnDate: '',
            achievements: [],
            createdAt: new Date().toISOString(),
            stepUnlocks: {
                step1: true,
                step2: false,
                step3: false,
                step4: false,
                step5: false
            }
        };
    },

    getDefaultSettings() {
        return {
            ttsSpeed: 1,
            soundEnabled: true,
            reminderEnabled: false,
            reminderTime: '09:00'
        };
    },

    getUserData() {
        const data = localStorage.getItem(this.KEYS.USER_DATA);
        if (!data) {
            const defaultData = this.getDefaultUserData();
            this.setUserData(defaultData);
            return defaultData;
        }
        return JSON.parse(data);
    },

    setUserData(data) {
        localStorage.setItem(this.KEYS.USER_DATA, JSON.stringify(data));
    },

    updateUserData(updates) {
        const currentData = this.getUserData();
        const newData = { ...currentData, ...updates };
        this.setUserData(newData);
        return newData;
    },

    getWordProgress() {
        const data = localStorage.getItem(this.KEYS.WORD_PROGRESS);
        return data ? JSON.parse(data) : {};
    },

    setWordProgress(progress) {
        localStorage.setItem(this.KEYS.WORD_PROGRESS, JSON.stringify(progress));
    },

    updateWordProgress(wordId, updates) {
        const progress = this.getWordProgress();
        if (!progress[wordId]) {
            progress[wordId] = {
                wordId: wordId,
                strength: 0,
                correctStreak: 0,
                nextReview: null,
                timesCorrect: 0,
                timesWrong: 0,
                lastSeen: null
            };
        }
        progress[wordId] = { ...progress[wordId], ...updates };
        this.setWordProgress(progress);
        return progress[wordId];
    },

    getWordProgressById(wordId) {
        const progress = this.getWordProgress();
        return progress[wordId] || null;
    },

    getSettings() {
        const data = localStorage.getItem(this.KEYS.SETTINGS);
        if (!data) {
            const defaultSettings = this.getDefaultSettings();
            this.setSettings(defaultSettings);
            return defaultSettings;
        }
        return JSON.parse(data);
    },

    setSettings(settings) {
        localStorage.setItem(this.KEYS.SETTINGS, JSON.stringify(settings));
    },

    updateSettings(updates) {
        const currentSettings = this.getSettings();
        const newSettings = { ...currentSettings, ...updates };
        this.setSettings(newSettings);
        return newSettings;
    },

    getWordCache() {
        const data = localStorage.getItem(this.KEYS.WORD_CACHE);
        return data ? JSON.parse(data) : null;
    },

    setWordCache(words) {
        localStorage.setItem(this.KEYS.WORD_CACHE, JSON.stringify(words));
    },

    getParaphrasingHistory() {
        const data = localStorage.getItem(this.KEYS.PARAPHRASING_HISTORY);
        return data ? JSON.parse(data) : [];
    },

    addParaphrasingEntry(entry) {
        const history = this.getParaphrasingHistory();
        history.push({
            ...entry,
            timestamp: new Date().toISOString()
        });
        localStorage.setItem(this.KEYS.PARAPHRASING_HISTORY, JSON.stringify(history));
        return history;
    },

    getReadingHistory() {
        const data = localStorage.getItem(this.KEYS.READING_HISTORY);
        return data ? JSON.parse(data) : [];
    },

    addReadingEntry(entry) {
        const history = this.getReadingHistory();
        history.push({
            ...entry,
            timestamp: new Date().toISOString()
        });
        localStorage.setItem(this.KEYS.READING_HISTORY, JSON.stringify(history));
        return history;
    },

    checkDailyReset() {
        const userData = this.getUserData();
        const today = new Date().toISOString().split('T')[0];
        const lastLearn = userData.lastLearnDate;

        if (lastLearn === today) return false;

        if (lastLearn) {
            const lastDate = new Date(lastLearn);
            const todayDate = new Date(today);
            const diffDays = Math.floor((todayDate - lastDate) / (1000 * 60 * 60 * 24));

            if (diffDays > 1 && userData.streak > 0) {
                userData.streak = 0;
            }
        }

        userData.lastLearnDate = today;

        if (!userData.streak) {
            userData.streak = 0;
        }
        userData.streak++;

        this.setUserData(userData);
        return true;
    },

    resetAll() {
        localStorage.removeItem(this.KEYS.USER_DATA);
        localStorage.removeItem(this.KEYS.WORD_PROGRESS);
        localStorage.removeItem(this.KEYS.SETTINGS);
        localStorage.removeItem(this.KEYS.PARAPHRASING_HISTORY);
        localStorage.removeItem(this.KEYS.READING_HISTORY);
    },

    getStats() {
        const userData = this.getUserData();
        const progress = this.getWordProgress();

        const totalWords = Object.keys(progress).length;
        const masteredWords = Object.values(progress).filter(p => p.strength >= 4).length;
        const learningWords = Object.values(progress).filter(p => p.strength > 0 && p.strength < 4).length;
        const paraphrasingHistory = this.getParaphrasingHistory();
        const readingHistory = this.getReadingHistory();

        return {
            totalXp: userData.totalXp,
            streak: userData.streak,
            currentStep: userData.currentStep,
            totalWordsLearned: totalWords,
            masteredWords: masteredWords,
            learningWords: learningWords,
            achievements: userData.achievements,
            paraphrasingCount: paraphrasingHistory.length,
            readingCount: readingHistory.length,
            stepUnlocks: userData.stepUnlocks
        };
    }
};

window.Storage = Storage;
</script>
    <script>/**
 * 间隔重复算法 (Spaced Repetition System)
 * 基于 SM-2 算法简化版，针对 Basic English 操作词增加 0.7x 复习间隔
 */

const SRS = {
    intervals: [1, 2, 4, 7, 15, 30],

    strengthThresholds: {
        0: 0,
        1: 1,
        2: 3,
        3: 5,
        4: 7,
        5: 10
    },

    /**
     * 计算下次复习日期
     * @param {number} strength - 当前记忆强度
     * @param {boolean} correct - 本次是否正确
     * @param {boolean} isOperation - 是否为操作词（操作词间隔缩短为 0.7x）
     * @returns {string} - ISO格式的日期字符串
     */
    calculateNextReview(strength, correct, isOperation = false) {
        if (!correct) {
            strength = Math.max(0, strength - 1);
        }

        const intervalIndex = Math.min(strength, this.intervals.length - 1);
        let intervalDays = this.intervals[intervalIndex];

        if (isOperation) {
            intervalDays = Math.max(1, Math.round(intervalDays * 0.7));
        }

        const nextDate = new Date();
        nextDate.setDate(nextDate.getDate() + intervalDays);

        return nextDate.toISOString();
    },

    calculateStrength(currentStrength, correct, correctStreak) {
        if (correct) {
            const streakBonus = Math.min(Math.floor(correctStreak / 3), 2);
            return Math.min(5, currentStrength + 1 + streakBonus);
        } else {
            return Math.max(0, currentStrength - 1);
        }
    },

    needsReview(wordProgress) {
        if (!wordProgress || !wordProgress.nextReview) return true;

        const now = new Date();
        const nextReview = new Date(wordProgress.nextReview);

        return now >= nextReview;
    },

    getReviewQueue(words, progressMap, limit = 10) {
        const now = new Date();
        const reviewQueue = [];

        for (const word of words) {
            const progress = progressMap[word.id];
            if (!progress) {
                reviewQueue.push({ word, priority: 100 });
            } else if (progress.nextReview) {
                const nextReview = new Date(progress.nextReview);
                if (now >= nextReview) {
                    const overdueDays = Math.floor((now - nextReview) / (1000 * 60 * 60 * 24));
                    reviewQueue.push({ word, priority: overdueDays + progress.strength });
                }
            }
        }

        reviewQueue.sort((a, b) => b.priority - a.priority);

        return reviewQueue.slice(0, limit).map(item => item.word);
    },

    getDailyTasks(words, progressMap, newWordsCount = 3, reviewCount = 7) {
        const now = new Date();
        const newWords = [];
        const reviewWords = [];

        for (const word of words) {
            const progress = progressMap[word.id];
            if (!progress) {
                newWords.push(word);
            } else if (progress.nextReview && now >= new Date(progress.nextReview)) {
                reviewWords.push(word);
            }
        }

        const selectedNewWords = newWords.slice(0, newWordsCount);
        const selectedReviewWords = reviewWords.slice(0, reviewCount);

        return {
            newWords: selectedNewWords,
            reviewWords: selectedReviewWords
        };
    },

    shuffleArray(array) {
        const shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    },

    /**
     * 为 Basic English 词义匹配练习生成选项
     * @param {Object} targetWord - 目标词
     * @param {Array} allWords - 所有词（用于生成干扰项）
     * @param {number} count - 选项数量
     * @returns {Array} - 选项数组 [{word, chinese}]
     */
    generateMeaningOptions(targetWord, allWords, count = 4) {
        const options = [{ word: targetWord.word, chinese: targetWord.chinese }];
        const otherWords = allWords.filter(w => w.id !== targetWord.id);

        const shuffled = this.shuffleArray(otherWords);

        for (let i = 0; i < shuffled.length && options.length < count; i++) {
            const w = shuffled[i];
            if (!options.find(o => o.chinese === w.chinese)) {
                options.push({ word: w.word, chinese: w.chinese });
            }
        }

        return this.shuffleArray(options);
    },

    /**
     * 生成 Basic English 单词辨识题选项（哪些是 Basic English 词）
     */
    generateIdentificationOptions(targetWord, allBasicWords, nonBasicWords, count = 4) {
        const options = [{ word: targetWord.word, isBasic: true }];
        const basicPool = allBasicWords.filter(w => w.id !== targetWord.id);
        const otherBasic = this.shuffleArray(basicPool).slice(0, Math.floor((count - 1) / 2));
        const otherNonBasic = this.shuffleArray(nonBasicWords).slice(0, Math.ceil((count - 1) / 2));

        for (const w of otherBasic) {
            options.push({ word: w.word, isBasic: true });
        }
        for (const w of otherNonBasic) {
            options.push({ word: w.word, isBasic: false });
        }

        return this.shuffleArray(options.slice(0, count));
    }
};

    <script>/**
 * TTS 语音模块
 * 使用 Web Speech API
 */

const TTS = {
    isSpeaking: false,
    defaultSpeed: 1,
    defaultLang: 'en-US',

    init() {
        if (!('speechSynthesis' in window)) {
            console.warn('Web Speech API not supported');
            return false;
        }
        return true;
    },

    speak(text, options = {}) {
        return new Promise((resolve, reject) => {
            if (!('speechSynthesis' in window)) {
                reject(new Error('Speech API not supported'));
                return;
            }

            this.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = options.lang || this.defaultLang;
            utterance.rate = options.speed || this.defaultSpeed;
            utterance.pitch = options.pitch || 1;
            utterance.volume = options.volume || 1;

            utterance.onstart = () => {
                this.isSpeaking = true;
            };

            utterance.onend = () => {
                this.isSpeaking = false;
                resolve();
            };

            utterance.onerror = (e) => {
                this.isSpeaking = false;
                reject(e);
            };

            speechSynthesis.speak(utterance);
        });
    },

    speakWord(word, options = {}) {
        return this.speak(word, {
            lang: 'en-US',
            ...options
        });
    },

    speakChinese(text, options = {}) {
        return this.speak(text, {
            lang: 'zh-CN',
            ...options
        });
    },

    cancel() {
        if ('speechSynthesis' in window) {
            speechSynthesis.cancel();
        }
        this.isSpeaking = false;
    },

    pause() {
        if ('speechSynthesis' in window) {
            speechSynthesis.pause();
        }
    },

    resume() {
        if ('speechSynthesis' in window) {
            speechSynthesis.resume();
        }
    },

    isSpeaking() {
        return this.isSpeaking;
    },

    getVoices() {
        return new Promise((resolve) => {
            if (!('speechSynthesis' in window)) {
                resolve([]);
                return;
            }

            const voices = speechSynthesis.getVoices();
            if (voices.length > 0) {
                resolve(voices);
            } else {
                speechSynthesis.onvoiceschanged = () => {
                    resolve(speechSynthesis.getVoices());
                };
            }
        });
    },

    async getEnglishVoice() {
        const voices = await this.getVoices();
        const englishVoices = voices.filter(v => v.lang.startsWith('en'));
        if (englishVoices.length > 0) {
            const preferred = englishVoices.find(v => v.name.includes('Google')) ||
                            englishVoices.find(v => v.name.includes('Microsoft')) ||
                            englishVoices[0];
            return preferred;
        }
        return null;
    }
};

window.TTS = TTS;

    <script>/**

 *
 * 输入: "The physician examined the patient."
 * 输出: { valid: false, words: [...], invalidWords: ["physician", "examined", "patient"], score: 57 }
 */

const BasicChecker = {
    basicWordSet: null,
    basicWordMap: null,

    /**
     * 不规则词映射表：变化形 → 原形
     * 覆盖 Basic English 动词和形容词的不规则变化
     */
    irregulars: {
        // 动词不规则过去式/过去分词
        'went': 'go', 'gone': 'go', 'goes': 'go',
        'came': 'come', 'comes': 'come',
        'got': 'get', 'gotten': 'get', 'gets': 'get',
        'gave': 'give', 'given': 'give', 'gives': 'give',
        'kept': 'keep', 'keeps': 'keep',
        'let': 'let', 'lets': 'let',
        'made': 'make', 'makes': 'make',
        'put': 'put', 'puts': 'put',
        'took': 'take', 'taken': 'take', 'takes': 'take',
        'seemed': 'seem', 'seems': 'seem',
        'was': 'be', 'were': 'be', 'been': 'be', 'being': 'be',
        'am': 'be', 'are': 'be', 'is': 'be',
        'did': 'do', 'done': 'do', 'does': 'do',
        'had': 'have', 'has': 'have', 'having': 'have',
        'said': 'say', 'says': 'say',
        'saw': 'see', 'seen': 'see', 'sees': 'see',
        'sent': 'send', 'sends': 'send',
        // 不规则比较级/最高级（Basic English 形容词）
        'better': 'good', 'best': 'good',
        'worse': 'bad', 'worst': 'bad',
        'more': 'much', 'most': 'much',
        'less': 'little', 'least': 'little',
        'farther': 'far', 'farthest': 'far',
        'further': 'far', 'furthest': 'far',
        // 其他常见不规则
        'felt': 'feel', 'fell': 'fall', 'fallen': 'fall',
        'thought': 'think', 'thoughts': 'thought',  // thought 不在 850 词中
        'knew': 'know', 'known': 'know',
        'told': 'tell',
        'began': 'begin', 'begun': 'begin',
        'brought': 'bring',
        'built': 'build',
        'bought': 'buy',
        'caught': 'catch',
        'chose': 'choose', 'chosen': 'choose',
        'drew': 'draw', 'drawn': 'draw',
        'drove': 'drive', 'driven': 'drive',
        'ate': 'eat', 'eaten': 'eat',
        'found': 'find',
        'flew': 'fly', 'flown': 'fly',
        'forgot': 'forget', 'forgotten': 'forget',
        'grew': 'grow', 'grown': 'grow',
        'heard': 'hear',
        'held': 'hold',
        'led': 'lead',
        'left': 'leave',
        'lost': 'lose',
        'meant': 'mean',
        'met': 'meet',
        'paid': 'pay',
        'ran': 'run',
        'showed': 'show', 'shown': 'show',
        'sat': 'sit',
        'slept': 'sleep',
        'spoke': 'speak', 'spoken': 'speak',
        'stood': 'stand',
        'swam': 'swim', 'swum': 'swim',
        'taught': 'teach',
        'threw': 'throw', 'thrown': 'throw',
        'understood': 'understand',
        'woke': 'wake', 'woken': 'wake',
        'wore': 'wear', 'worn': 'wear',
        'won': 'win',
        'wrote': 'write', 'written': 'write',
        'read': 'read',
        'cut': 'cut',
        'hit': 'hit',
        'hurt': 'hurt',
        'set': 'set',
        'shut': 'shut',
        'spent': 'spend',
        'cost': 'cost'
    },

    /**
     * 初始化检查器，加载 850 词集合
     * @param {Array} basicWords - basic_words.json 的数据
     */
    init(basicWords) {
        this.basicWordSet = new Set();
        this.basicWordMap = {};

        for (const entry of basicWords) {
            const word = entry.word.toLowerCase();
            this.basicWordSet.add(word);
            this.basicWordMap[word] = entry;

            // 对于操作词中的动词，添加常见规则屈折形式
            if (entry.type === 'operation' && entry.combinations && entry.combinations.length > 0) {
                this.basicWordSet.add(word + 's');
                this.basicWordSet.add(word + 'ing');
                this.basicWordSet.add(word + 'ed');
                // 去 e 再加 -ing/-ed
                if (word.endsWith('e')) {
                    this.basicWordSet.add(word.slice(0, -1) + 'ing');
                    this.basicWordSet.add(word.slice(0, -1) + 'ed');
                }
            }
        }

        // 常见合法屈折形式：即使 base form 不在 850 词，也接受
        this._addCommonInflections();
    },

    /**
     * 添加常见规则屈折形式到合法集
     */
    _addCommonInflections() {
        const commonPlurals = ['things', 'days', 'ways', 'times', 'men', 'women', 'children',
            'feet', 'teeth', 'mice', 'leaves', 'lives', 'knives', 'shelves'];
        for (const w of commonPlurals) {
            this.basicWordSet.add(w);
        }
    },

    /**
     * 分词：将句子拆分为单词数组（保留原始大小写以便展示）
     * @param {string} sentence
     * @returns {Array<{raw: string, lower: string, index: number}>}
     */
    tokenize(sentence) {
        const tokens = [];
        const regex = /[a-zA-Z]+('[a-zA-Z]+)?/g;
        let match;

        while ((match = regex.exec(sentence)) !== null) {
            tokens.push({
                raw: match[0],
                lower: match[0].toLowerCase(),
                index: match.index
            });
        }

        return tokens;
    },

    /**
     * 词形还原：去除常见英文字尾，返回基本形式
     * @param {string} word - 已小写化的单词
     * @returns {string} - 还原后的词干
     */
    lemmatize(word) {
        // 先查不规则表
        if (this.irregulars[word]) {
            return this.irregulars[word];
        }

        // 去除所有格 's
        if (word.endsWith("'s")) {
            word = word.slice(0, -2);
        }

        // 复合词：如 everybody → every + body（不在 850 也无妨）
        // nothing, something, anyone 等不在 Basic English 中

        // 去除副词后缀 -ly（但 careful→care 这类需要保留）
        if (word.endsWith('ly') && word.length > 4) {
            const stem = word.slice(0, -2);
            // 只有 -ly 是加在形容词后的才去除
            if (stem.endsWith('l')) {
                const doubleL = word.slice(0, -1);
                if (this.basicWordSet.has(doubleL)) return doubleL;
            }
            if (this.basicWordSet.has(stem)) return stem;
            // really → real (不在850), carefully → careful (不在850) 等
            // 不强制还原，如果 stem 不在集合中，保持原样
        }

        // 去除 -ing
        if (word.endsWith('ing') && word.length > 4) {
            let stem = word.slice(0, -3);
            if (this.basicWordSet.has(stem)) return stem;
            // 双写辅音：running → run
            if (stem.length > 2 && stem[stem.length - 1] === stem[stem.length - 2]) {
                const singleConsonant = stem.slice(0, -1);
                if (this.basicWordSet.has(singleConsonant)) return singleConsonant;
            }
            // 去 e：making → make
            if (this.basicWordSet.has(stem + 'e')) return stem + 'e';
        }

        // 去除 -ed
        if (word.endsWith('ed') && word.length > 3) {
            let stem = word.slice(0, -2);
            if (this.basicWordSet.has(stem)) return stem;
            // 双写辅音：stopped → stop
            if (stem.length > 2 && stem[stem.length - 1] === stem[stem.length - 2]) {
                const singleConsonant = stem.slice(0, -1);
                if (this.basicWordSet.has(singleConsonant)) return singleConsonant;
            }
            // -ied → -y：carried → carry
            if (stem.endsWith('i') && stem.length > 2) {
                const yForm = stem.slice(0, -1) + 'y';
                if (this.basicWordSet.has(yForm)) return yForm;
            }
            // 去 e：liked → like
            if (this.basicWordSet.has(stem + 'e')) return stem + 'e';
            // 只去 d：liked → like (stem 已是 like 去掉 d)
            const stemWithoutD = word.slice(0, -1);
            if (this.basicWordSet.has(stemWithoutD)) return stemWithoutD;
        }

        // 去除 -s / -es
        if (word.endsWith('es') && word.length > 4) {
            let stem = word.slice(0, -2);
            if (this.basicWordSet.has(stem)) return stem;
            // -ies → -y：carries → carry
            if (stem.endsWith('i') && stem.length > 2) {
                const yForm = stem.slice(0, -1) + 'y';
                if (this.basicWordSet.has(yForm)) return yForm;
            }
            // -ves → -f：leaves → leaf (但不规则表已处理)
        }
        if (word.endsWith('s') && !word.endsWith('ss') && word.length > 3) {
            let stem = word.slice(0, -1);
            if (this.basicWordSet.has(stem)) return stem;
        }

        // 去除 -er / -est 比较级
        if (word.endsWith('est') && word.length > 5) {
            let stem = word.slice(0, -3);
            if (this.basicWordSet.has(stem)) return stem;
            // 双写：biggest → big
            if (stem.length > 2 && stem[stem.length - 1] === stem[stem.length - 2]) {
                const single = stem.slice(0, -1);
                if (this.basicWordSet.has(single)) return single;
            }
        }
        if (word.endsWith('er') && word.length > 4) {
            let stem = word.slice(0, -2);
            if (this.basicWordSet.has(stem)) return stem;
            // 双写：bigger → big
            if (stem.length > 2 && stem[stem.length - 1] === stem[stem.length - 2]) {
                const single = stem.slice(0, -1);
                if (this.basicWordSet.has(single)) return single;
            }
            // -ier → -y：happier → happy
            if (stem.endsWith('i') && stem.length > 2) {
                const yForm = stem.slice(0, -1) + 'y';
                if (this.basicWordSet.has(yForm)) return yForm;
            }
        }

        return word;
    },

    /**
     * 检查句子是否仅使用 Basic English 词汇
     * @param {string} sentence - 用户输入的英文句子
     * @returns {Object} - { valid, words, invalidWords, score, suggestions }
     */
    checkSentence(sentence) {
        if (!this.basicWordSet) {
            return { valid: false, words: [], invalidWords: [], score: 0, suggestions: [], error: 'checker未初始化' };
        }

        const tokens = this.tokenize(sentence);
        const words = [];
        const invalidWords = [];
        const suggestions = [];

        for (const token of tokens) {
            const lemma = this.lemmatize(token.lower);
            const isBasic = this.basicWordSet.has(lemma) || this.basicWordSet.has(token.lower);

            words.push({
                raw: token.raw,
                lower: token.lower,
                lemma: lemma,
                isBasic: isBasic
            });

            if (!isBasic) {
                invalidWords.push({
                    word: token.raw,
                    lemma: lemma
                });

                // 查找替换建议
                const suggestion = this._findSuggestion(lemma);
                if (suggestion) {
                    suggestions.push({
                        original: token.raw,
                        suggestion: suggestion
                    });
                }
            }
        }

        const totalWords = tokens.length;
        const validCount = totalWords - invalidWords.length;
        const score = totalWords > 0 ? Math.round((validCount / totalWords) * 100) : 100;

        return {
            valid: invalidWords.length === 0,
            words: words,
            invalidWords: invalidWords,
            suggestions: suggestions,
            score: score,
            totalWords: totalWords,
            validCount: validCount
        };

    <script>/**
 * 步骤1：操作词学习引擎
 * 100 个核心动词/功能词
 * 题型：词义匹配、操作词+小品词组合识别、Basic English 单词辨识
 */

const OperationsEngine = {
    words: [],
    currentExercise: null,
    exerciseIndex: 0,
    totalExercises: 5,

    init(words) {
        this.words = words || [];
    },

    /**
     * 生成一组练习
     * @param {number} count - 题目数量
     * @returns {Array} - 练习数组
     */
    generateExercises(count = 10) {
        this.totalExercises = count;
        const progressMap = Storage.getWordProgress();
        const operations = this.words.filter(w => w.type === 'operation');

        if (operations.length === 0) return [];

        const dailyTasks = SRS.getDailyTasks(operations, progressMap, Math.ceil(count / 2), Math.ceil(count / 2));
        let candidateWords = [...dailyTasks.newWords, ...dailyTasks.reviewWords];

        // 如果不够，随机补充
        if (candidateWords.length < count) {
            const remaining = operations.filter(w => !candidateWords.find(c => c.id === w.id));
            const shuffled = SRS.shuffleArray(remaining);
            candidateWords = [...candidateWords, ...shuffled].slice(0, count);
        } else {
            candidateWords = SRS.shuffleArray(candidateWords).slice(0, count);
        }

        const exercises = [];
        for (const word of candidateWords) {
            const type = this._pickExerciseType(word);
            exercises.push(this._createExercise(word, type));
        }

        return exercises;
    },

    _pickExerciseType(word) {
        // 有搭配的操作词 → 搭配识别题；否则 → 词义匹配
        if (word.combinations && word.combinations.length > 0 && Math.random() > 0.5) {
            return 'combination';
        }
        if (Math.random() > 0.7) {
            return 'identification';
        }
        return 'meaning';
    },

    _createExercise(word, type) {
        const base = {
            id: word.id,
            word: word.word,
            chinese: word.chinese,
            phonetic: word.phonetic,
            type: word.type,
            exerciseType: type,
            isOperation: true
        };

        switch (type) {
            case 'meaning':
                return {
                    ...base,
                    displayType: 'meaning',
                    question: '这个词的中文意思是？',
                    options: SRS.generateMeaningOptions(word, this.words, 4),
                    correctAnswer: word.word
                };

            case 'combination':
                const combo = word.combinations[Math.floor(Math.random() * word.combinations.length)];
                const wrongCombos = this._generateWrongCombos(word, combo, 3);
                const comboOptions = SRS.shuffleArray([
                    { verb: word.word, particle: combo.particles, replaces: combo.replaces, correct: true, example: combo.example },
                    ...wrongCombos
                ]);
                return {
                    ...base,
                    displayType: 'combination',
                    verb: word.word,
                    targetParticle: combo.particles,
                    replaces: combo.replaces,
                    example: combo.example,
                    comboOptions: comboOptions,
                    correctParticle: combo.particles
                };

            case 'identification':
                // "哪些词属于 Basic English 的 850 词？"
                const nonBasicWords = [
                    { word: 'physician', isBasic: false },
                    { word: 'automobile', isBasic: false },
                    { word: 'purchase', isBasic: false },
                    { word: 'examine', isBasic: false },
                    { word: 'depart', isBasic: false },
                    { word: 'arrive', isBasic: false },
                    { word: 'attempt', isBasic: false },
                    { word: 'require', isBasic: false },
                    { word: 'demonstrate', isBasic: false },
                    { word: 'frequently', isBasic: false }
                ];
                const idOptions = SRS.generateIdentificationOptions(word, this.words, nonBasicWords, 4);
                return {
                    ...base,
                    displayType: 'identification',
                    question: '哪些是 Basic English 单词？（可多选，点击确认后检查）',
                    idOptions: idOptions
                };

            default:
                return {
                    ...base,
                    displayType: 'meaning',
                    question: '这个词的中文意思是？',
                    options: SRS.generateMeaningOptions(word, this.words, 4),
                    correctAnswer: word.word
                };
        }
    },

    _generateWrongCombos(word, correctCombo, count) {
        const allParticles = ['up', 'down', 'in', 'out', 'on', 'off', 'over', 'through', 'across', 'at', 'by', 'to', 'from', 'with', 'about', 'after', 'before', 'under'];
        const wrongParticles = allParticles.filter(p => p !== correctCombo.particles && (!word.combinations || !word.combinations.find(c => c.particles === p)));
        const shuffled = SRS.shuffleArray(wrongParticles).slice(0, count);

        return shuffled.map(p => ({
            verb: word.word,
            particle: p,
            replaces: ['?'],
            correct: false,
            example: ''
        }));
    },

    checkAnswer(exercise, answer) {
        let correct = false;
        let feedback = '';
        let correctAnswer = '';

        switch (exercise.displayType) {
            case 'meaning':
                correct = answer === exercise.correctAnswer;
                correctAnswer = exercise.correctAnswer;
                feedback = correct ? '正确！' : `正确答案是 "${correctAnswer}"`;
                break;

            case 'combination':
                correct = answer && answer.correct === true;
                correctAnswer = exercise.comboOptions.find(o => o.correct);
                const correctParticle = correctAnswer ? correctAnswer.particle : exercise.correctParticle;
                feedback = correct
                    ? `正确！"${exercise.word} ${correctParticle}" 可以替代 "${exercise.replaces.join(', ')}"`
                    : `正确答案是 "${exercise.word} ${correctParticle}"`;
                break;

            case 'identification':
                // answer is array of selected indices
                const correctIndices = exercise.idOptions
                    .map((o, i) => o.isBasic ? i : -1)
                    .filter(i => i >= 0);
                const selected = answer || [];
                const allCorrect = correctIndices.every(i => selected.includes(i)) &&
                    selected.every(i => correctIndices.includes(i));
                correct = allCorrect;
                correctAnswer = exercise.idOptions
                    .filter(o => o.isBasic)
                    .map(o => o.word)
                    .join(', ');
                feedback = correct
                    ? '完全正确！这些都是 Basic English 单词。'
                    : `Basic English 词是: ${correctAnswer}`;
                break;
        }

        // 更新 SRS 进度
        const progress = Storage.getWordProgressById(exercise.id);
        const currentStrength = progress ? progress.strength : 0;
        const currentStreak = progress ? (progress.correctStreak || 0) : 0;
        const newStreak = correct ? currentStreak + 1 : 0;
        const newStrength = SRS.calculateStrength(currentStrength, correct, currentStreak);
        const nextReview = SRS.calculateNextReview(newStrength, correct, true); // operations: 0.7x interval

        Storage.updateWordProgress(exercise.id, {
            strength: newStrength,
            correctStreak: newStreak,
            nextReview: nextReview,
            timesCorrect: (progress ? progress.timesCorrect : 0) + (correct ? 1 : 0),
            timesWrong: (progress ? progress.timesWrong : 0) + (correct ? 0 : 1),
            lastSeen: new Date().toISOString()
        });

        return {
            correct,
            feedback,
            correctAnswer: typeof correctAnswer === 'string' ? correctAnswer : (correctAnswer.text || correctAnswer)
        };
    },

    getScore() {
        const progressMap = Storage.getWordProgress();
        const operations = this.words.filter(w => w.type === 'operation');
        const total = operations.length;
        const mastered = operations.filter(w => {
            const p = progressMap[w.id];
            return p && p.strength >= 4;
        }).length;
        return { total, mastered, percent: total > 0 ? Math.round((mastered / total) * 100) : 0 };
    }
};

window.OperationsEngine = OperationsEngine;

    <script>/**
 * 步骤2-3：事物词 + 属性词学习引擎
 * 600 名词 + 150 形容词
 * 题型：词义匹配、反义词配对、分类排序、语境填空
 */

const VocabularyEngine = {
    words: [],

    qualityWords: [],

    // 简单的图片词映射（使用 emoji 作为视觉辅助）
    picturableMap: {
        'apple': '\uD83C\uDF4E', 'orange': '\uD83C\uDF4A', 'banana': '\uD83C\uDF4C',
        'cat': '\uD83D\uDC08', 'dog': '\uD83D\uDC15', 'bird': '\uD83D\uDC26', 'fish': '\uD83D\uDC1F',
        'tree': '\uD83C\uDF33', 'flower': '\uD83C\uDF3C', 'sun': '\u2600\uFE0F', 'moon': '\uD83C\uDF19',
        'star': '\u2B50', 'water': '\uD83D\uDCA7', 'fire': '\uD83D\uDD25',
        'house': '\uD83C\uDFE0', 'book': '\uD83D\uDCD6', 'door': '\uD83D\uDEAA',
        'car': '\uD83D\uDE97', 'train': '\uD83D\uDE86', 'boat': '\uD83D\uDEA2', 'plane': '\u2708\uFE0F',
        'hand': '\u270B', 'foot': '\uD83E\uDDB6', 'eye': '\uD83D\uDC41', 'mouth': '\uD83D\uDC44',
        'head': '\uD83D\uDC64', 'heart': '\u2764\uFE0F', 'bread': '\uD83C\uDF5E', 'milk': '\uD83E\uDD5B',
        'egg': '\uD83E\uDD5A', 'cake': '\uD83C\uDF70', 'shoe': '\uD83D\uDC5F', 'hat': '\uD83C\uDFA9',
        'bed': '\uD83D\uDECF\uFE0F', 'table': '\uD83C\uDFE2', 'chair': '\uD83E\uDE91',

        'cup': '\u2615', 'bottle': '\uD83C\uDF7E', 'pen': '\uD83D\uDD8A\uFE0F'
    },

    // 反义词对（用于配对练习）
    antonymPairs: [],

    init(words) {
        this.words = words || [];
        this.thingWords = this.words.filter(w => w.type === 'thing');

    },

    /**

     * @param {number} count
     */
    generateExercises(subStep = 'things', count = 10) {
        this.totalExercises = count;
        const progressMap = Storage.getWordProgress();

        let pool;
        switch (subStep) {
            case 'things':
                pool = this.thingWords;

            case 'qualities':
                pool = this.qualityWords;
                break;
            case 'mixed':
            default:
                pool = [...this.thingWords, ...this.qualityWords];
                break;
        }

        if (pool.length === 0) return [];

        const dailyTasks = SRS.getDailyTasks(pool, progressMap, Math.ceil(count / 2), Math.ceil(count / 2));
        let candidateWords = [...dailyTasks.newWords, ...dailyTasks.reviewWords];

        if (candidateWords.length < count) {
            const remaining = pool.filter(w => !candidateWords.find(c => c.id === w.id));
            candidateWords = [...candidateWords, ...SRS.shuffleArray(remaining)].slice(0, count);
        } else {
            candidateWords = SRS.shuffleArray(candidateWords).slice(0, count);
        }

        const exercises = [];
        for (const word of candidateWords) {
            exercises.push(this._createExercise(word, subStep));
        }

        return exercises;
    },

    _createExercise(word, subStep) {
        const types = ['meaning'];

        if (subStep === 'qualities' || word.type === 'quality') {
            types.push('antonym');
            types.push('context');
        }
        if (this.picturableMap[word.word]) {
            types.push('picture');
        }
        types.push('context');

        const type = types[Math.floor(Math.random() * types.length)];

        const base = {
            id: word.id,
            word: word.word,
            chinese: word.chinese,
            phonetic: word.phonetic,
            type: word.type,
            exerciseType: type,
            isOperation: false
        };

        switch (type) {
            case 'meaning':
                return {
                    ...base,
                    displayType: 'meaning',
                    question: '这个词的中文意思是？',
                    options: SRS.generateMeaningOptions(word, this.words, 4),
                    correctAnswer: word.word
                };

            case 'picture':
                return {
                    ...base,
                    displayType: 'picture',
                    question: `这个图标"${this.picturableMap[word.word]}"对应的英文词是？`,
                    emoji: this.picturableMap[word.word],
                    options: SRS.generateMeaningOptions(word, this.words, 4),
                    correctAnswer: word.word
                };

            case 'antonym':
                // 需要反义词数据，这里为简单处理，生成词义匹配的变体
                const antonymHint = this._getAntonym(word);
                if (antonymHint) {
                    return {
                        ...base,
                        displayType: 'antonym',
                        question: `"${word.word}" 的反义词是？`,
                        options: this._generateAntonymOptions(word, antonymHint),
                        correctAnswer: antonymHint.word
                    };
                }
                // fall through to meaning
                return {
                    ...base,
                    displayType: 'meaning',
                    question: '这个词的中文意思是？',
                    options: SRS.generateMeaningOptions(word, this.words, 4),
                    correctAnswer: word.word
                };

            case 'context':
                const contextSentence = this._generateContextSentence(word);
                return {
                    ...base,
                    displayType: 'context',
                    question: `选择最合适的词填空："${contextSentence}"`,
                    contextSentence: contextSentence,
                    options: SRS.generateMeaningOptions(word, this.words, 4),
                    correctAnswer: word.word
                };

            default:
                return {
                    ...base,
                    displayType: 'meaning',
                    question: '这个词的中文意思是？',
                    options: SRS.generateMeaningOptions(word, this.words, 4),
                    correctAnswer: word.word
                };
        }
    },

    _getAntonym(word) {
        const antonymMap = {
            'good': 'bad', 'bad': 'good',
            'big': 'small', 'small': 'big',
            'high': 'low', 'low': 'high',
            'hot': 'cold', 'cold': 'hot',
            'fast': 'slow', 'slow': 'fast',
            'hard': 'soft', 'soft': 'hard',
            'heavy': 'light', 'light': 'heavy',
            'long': 'short', 'short': 'long',
            'new': 'old', 'old': 'new',
            'open': 'shut', 'shut': 'open',
            'rich': 'poor', 'poor': 'rich',
            'right': 'wrong', 'wrong': 'right',
            'strong': 'weak', 'weak': 'strong',
            'thick': 'thin', 'thin': 'thick',
            'true': 'false', 'false': 'true',
            'wide': 'narrow', 'narrow': 'wide',
            'happy': 'sad', 'sad': 'happy',
            'clean': 'dirty', 'dirty': 'clean',
            'dry': 'wet', 'wet': 'dry',
            'early': 'late', 'late': 'early',
            'full': 'empty', 'empty': 'full',
            'sweet': 'bitter', 'bitter': 'sweet',
            'black': 'white', 'white': 'black',
            'beautiful': 'ugly', 'ugly': 'beautiful',
            'safe': 'dangerous', 'dangerous': 'safe',
            'sharp': 'dull', 'dull': 'sharp',
            'smooth': 'rough', 'rough': 'smooth',
            'straight': 'bent', 'bent': 'straight',
            'tight': 'loose', 'loose': 'tight',
            'wise': 'foolish', 'foolish': 'wise',
            'young': 'old'
        };

        const antonymWord = antonymMap[word.word];
        if (antonymWord) {
            const antonymEntry = this.words.find(w => w.word === antonymWord);
            if (antonymEntry) {
                return { word: antonymEntry.word, chinese: antonymEntry.chinese };
            }
        }
        return null;
    },

    _generateAntonymOptions(word, antonym) {
        const options = [{ word: antonym.word, chinese: antonym.chinese }];
        const others = this.qualityWords.filter(w =>
            w.id !== word.id && w.word !== antonym.word
        );
        const shuffled = SRS.shuffleArray(others).slice(0, 3);
        for (const w of shuffled) {
            if (!options.find(o => o.chinese === w.chinese)) {
                options.push({ word: w.word, chinese: w.chinese });
            }
        }
        return SRS.shuffleArray(options);
    },

    _generateContextSentence(word) {
        const sentences = {
            'good': 'This is a very ___ book. I like it.',
            'bad': 'The weather is ___ today. It is raining.',
            'big': 'An elephant is a very ___ animal.',
            'small': 'An ant is a very ___ insect.',
            'high': 'The mountain is very ___.',
            'low': 'The table is too ___ for me.',
            'hot': 'The water is too ___ to drink.',
            'cold': 'The ice is very ___.',
            'fast': 'The car is going very ___.',
            'slow': 'The turtle is a ___ animal.',
            'hard': 'This stone is very ___.',
            'soft': 'The bed is very ___.',
            'long': 'The road is very ___.',
            'short': 'The pencil is too ___.',
            'new': 'I have a ___ dress.',
            'old': 'This building is very ___.',
            'clean': 'The room is very ___.',
            'dirty': 'The floor is ___.',
            'happy': 'She is very ___ today.',
            'sad': 'He felt ___ after hearing the news.',
            'beautiful': 'The garden is very ___.',
            'strong': 'He is a very ___ man.',
            'weak': 'After being sick, he felt ___.',
            'rich': 'He has a lot of money. He is ___.',
            'poor': 'She has no money. She is ___.',
            'wide': 'The river is very ___.',
            'narrow': 'The road through the mountain is ___.',
            'thick': 'The book is very ___.',
            'thin': 'The paper is ___.',
            'dry': 'The ground is ___ after days of sun.',
            'wet': 'My clothes are ___ from the rain.',
        };

        if (sentences[word.word]) {
            return sentences[word.word];
        }
        return `The word "${word.word}" is a ${word.type === 'thing' ? 'noun' : 'describing word'} that means "${word.chinese}".`;
    },

    checkAnswer(exercise, answer) {
        let correct = false;
        let feedback = '';

        switch (exercise.displayType) {
            case 'meaning':
            case 'picture':
                correct = answer === exercise.correctAnswer;
                feedback = correct
                    ? `正确！"${exercise.correctAnswer}" 的意思是"${exercise.chinese}"`
                    : `正确答案是 "${exercise.correctAnswer}"（${exercise.chinese}）`;
                break;

            case 'antonym':
                correct = answer === exercise.correctAnswer;
                feedback = correct
                    ? `正确！"${exercise.word}" 的反义词是 "${exercise.correctAnswer}"`
                    : `"${exercise.word}" 的反义词是 "${exercise.correctAnswer}"`;
                break;

            case 'context':
                correct = answer === exercise.correctAnswer;
                feedback = correct
                    ? `正确！句子应填入 "${exercise.correctAnswer}"`
                    : `正确答案是 "${exercise.correctAnswer}"。完整句子：${exercise.contextSentence.replace('___', exercise.correctAnswer)}`;
                break;

            default:
                correct = answer === exercise.correctAnswer;
                feedback = correct ? '正确！' : `正确答案是 "${exercise.correctAnswer}"`;
        }

        // 更新 SRS 进度
        const progress = Storage.getWordProgressById(exercise.id);
        const currentStrength = progress ? progress.strength : 0;
        const currentStreak = progress ? (progress.correctStreak || 0) : 0;
        const newStreak = correct ? currentStreak + 1 : 0;
        const newStrength = SRS.calculateStrength(currentStrength, correct, currentStreak);
        const nextReview = SRS.calculateNextReview(newStrength, correct, false);

        Storage.updateWordProgress(exercise.id, {
            strength: newStrength,
            correctStreak: newStreak,
            nextReview: nextReview,
            timesCorrect: (progress ? progress.timesCorrect : 0) + (correct ? 1 : 0),
            timesWrong: (progress ? progress.timesWrong : 0) + (correct ? 0 : 1),
            lastSeen: new Date().toISOString()
        });

        return {
            correct,
            feedback,
            correctAnswer: exercise.correctAnswer
        };
    },

    getScore(type = 'all') {
        const progressMap = Storage.getWordProgress();
        let pool;
        switch (type) {
            case 'things': pool = this.thingWords; break;
            case 'qualities': pool = this.qualityWords; break;
            default: pool = [...this.thingWords, ...this.qualityWords]; break;
        }
        const total = pool.length;
        const mastered = pool.filter(w => {
            const p = progressMap[w.id];
            return p && p.strength >= 4;
        }).length;
        return { total, mastered, percent: total > 0 ? Math.round((mastered / total) * 100) : 0 };
    }
};
